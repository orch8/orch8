  # ============================================================
  # Memory
  # ============================================================
  /api/memory/knowledge:
    post:
      tags: [Memory]
      summary: Create knowledge entity
      description: Requires projectId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntity"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntity"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "409":
          description: Duplicate slug in project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Memory]
      summary: List knowledge entities
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
          description: Auto-scoped from auth if present
        - name: entityType
          in: query
          schema:
            $ref: "#/components/schemas/EntityType"
      responses:
        "200":
          description: Entity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntity"

  /api/memory/knowledge/search:
    get:
      tags: [Memory]
      summary: Full-text search across facts
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: projectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory/knowledge/{id}:
    get:
      tags: [Memory]
      summary: Get entity summary
      description: Project-scoped when caller has a projectId.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntity"
        "404":
          description: Not found or project mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory/knowledge/{id}/facts:
    get:
      tags: [Memory]
      summary: List entity facts
      description: Returns scored facts. Project-scoped.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fact list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeFact"
        "404":
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Memory]
      summary: Write fact
      description: sourceAgent is auto-tagged from the caller's agent ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFact"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeFact"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory/knowledge/{entityId}/facts/{factId}/supersede:
    post:
      tags: [Memory]
      summary: Supersede a fact
      description: Replaces an existing fact with an updated version.
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
        - name: factId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFact"
      responses:
        "201":
          description: New fact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeFact"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Entity or fact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Fact already superseded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory/knowledge/{id}/summarize:
    post:
      tags: [Memory]
      summary: Trigger summary regeneration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Summary regenerated
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Entity or project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory/worklog:
    get:
      tags: [Memory]
      summary: Read work log entries
      description: Requires both agentId and projectId.
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
          description: Defaults to caller's agent ID
      responses:
        "200":
          description: Work log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
        "400":
          description: Missing agentId or projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Memory]
      summary: Append to work log
      description: Agents can only write their own log. Admins must provide agentId in body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 50000
      responses:
        "201":
          description: Appended
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  filename:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory/lessons:
    get:
      tags: [Memory]
      summary: Read lessons file
      description: Requires both agentId and projectId.
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
          description: Defaults to caller's agent ID
      responses:
        "200":
          description: Lessons content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
        "400":
          description: Missing agentId or projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Memory]
      summary: Append to lessons file
      description: Agents can only write their own lessons. Admins must provide agentId in body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 10000
      responses:
        "201":
          description: Appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================
  # Cost
  # ============================================================
  /api/cost/summary:
    get:
      tags: [Cost]
      summary: Aggregated cost by agent
      description: Agent callers must have a projectId. Admins may omit for cross-project.
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cost summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                  byAgent:
                    type: array
                    items:
                      type: object
                      properties:
                        agentId:
                          type: string
                        totalCost:
                          type: number
                        runCount:
                          type: integer
        "400":
          description: Agent without projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cost/timeseries:
    get:
      tags: [Cost]
      summary: Time-series cost data
      description: Aggregated by day and agent. Agents cannot query another project's data.
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 7
      responses:
        "200":
          description: Time-series data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date
                    agentId:
                      type: string
                    totalCost:
                      type: number
                    runCount:
                      type: integer
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Cross-project access by agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cost/task/{taskId}:
    get:
      tags: [Cost]
      summary: Per-task cost breakdown
      description: Requires projectId. Returns empty runs array if no runs match.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task cost breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                  runs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        agentId:
                          type: string
                        costUsd:
                          type: number
                          nullable: true
                        status:
                          $ref: "#/components/schemas/RunStatus"
                        startedAt:
                          type: string
                          format: date-time
                          nullable: true
                        finishedAt:
                          type: string
                          format: date-time
                          nullable: true
        "400":
          description: Missing projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cost/task/{taskId}/phases:
    get:
      tags: [Cost]
      summary: Per-phase cost breakdown
      description: For complex tasks. Requires projectId.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Phase cost breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                  byPhase:
                    type: array
                    items:
                      type: object
                      properties:
                        phase:
                          type: string
                        totalCost:
                          type: number
                        runCount:
                          type: integer
        "400":
          description: Missing projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================
  # Activity Log
  # ============================================================
  /api/log:
    get:
      tags: [Activity Log]
      summary: Paginated activity log
      description: Requires projectId.
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
          description: Required (from query or auth context)
        - name: agentId
          in: query
          schema:
            type: string
        - name: taskId
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            $ref: "#/components/schemas/LogLevel"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
        "400":
          description: Missing projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Activity Log]
      summary: Append log entry
      description: agentId and runId are auto-enriched from auth context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLogEntry"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  # ============================================================
  # Daemon
  # ============================================================
  /api/daemon/status:
    get:
      tags: [Daemon]
      summary: Daemon status
      responses:
        "200":
          description: Daemon runtime status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: running
                  pid:
                    type: integer
                  uptimeMs:
                    type: number
                  uptimeFormatted:
                    type: string
                    example: "1h 0m 0s"
                  tickIntervalMs:
                    type: integer
                  processCount:
                    type: integer
                  queueDepth:
                    type: integer

  /api/daemon/logs:
    get:
      tags: [Daemon]
      summary: Daemon logs (stub)
      description: Always returns empty array. Use WebSocket `daemon:log` events for real-time logs.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: level
          in: query
          schema:
            type: string
            enum: [trace, debug, info, warn, error, fatal]
      responses:
        "200":
          description: Empty logs with redirect message
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items: {}
                  message:
                    type: string
                    example: "Use WebSocket daemon:log events for real-time logs"

  /api/daemon/config:
    get:
      tags: [Daemon]
      summary: Get global config
      responses:
        "200":
          description: Full daemon configuration
          content:
            application/json:
              schema:
                type: object
                description: Global config from ~/.orch8/config.yaml
    patch:
      tags: [Daemon]
      summary: Update daemon config
      description: Values are deep-merged into existing config and written to disk.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orchestrator:
                  type: object
                  properties:
                    tick_interval_ms:
                      type: integer
                      minimum: 1
                    log_level:
                      type: string
                      enum: [trace, debug, info, warn, error, fatal]
                defaults:
                  type: object
                  properties:
                    model:
                      type: string
                    max_turns:
                      type: integer
                      minimum: 1
                    auto_commit:
                      type: boolean
                    auto_pr:
                      type: boolean
                    verification_required:
                      type: boolean
                    brainstorm_idle_timeout_min:
                      type: integer
                      minimum: 0
                limits:
                  type: object
                  properties:
                    max_concurrent_agents:
                      type: integer
                      minimum: 1
                    max_concurrent_per_project:
                      type: integer
                      minimum: 1
                    max_spawns_per_hour:
                      type: integer
                      minimum: 1
                    cooldown_on_failure:
                      type: integer
                      minimum: 0
                memory:
                  type: object
                  properties:
                    extraction_on_session_end:
                      type: boolean
                    summary_rewrite_schedule:
                      type: string
                      enum: [daily, weekly, monthly]
                    fact_decay_days:
                      type: integer
                      minimum: 1
                restart:
                  type: boolean
                  description: If true, daemon restarts after applying config
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  config:
                    type: object
                  restarting:
                    type: boolean
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/daemon/restart:
    post:
      tags: [Daemon]
      summary: Restart daemon
      description: Response is sent before the process terminates.
      responses:
        "200":
          description: Restart initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    example: Restart initiated

  # ============================================================
  # Notifications
  # ============================================================
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: Requires projectId.
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
          description: Falls back to auth projectId
        - name: unread
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "400":
          description: Missing projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notifications/read:
    post:
      tags: [Notifications]
      summary: Mark notifications as read
      description: "Requires projectId. Either provide specific IDs or set all to true."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [ids]
                  properties:
                    ids:
                      type: array
                      items:
                        type: string
                      minItems: 1
                - type: object
                  required: [all]
                  properties:
                    all:
                      type: boolean
                      enum: [true]
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Validation error or missing projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
